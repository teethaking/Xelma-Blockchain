name: Deploy Testnet

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Perform a dry run — validate everything, broadcast nothing"
        type: boolean
        required: true
        default: true

concurrency:
  group: deploy-testnet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    name: Validate and Deploy
    runs-on: ubuntu-latest
    environment: testnet
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deploy-
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v1
        with:
          version: "22.1.0"

      - name: Run deployment script (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
          SOROBAN_NETWORK_PASSPHRASE: ${{ secrets.SOROBAN_NETWORK_PASSPHRASE }}
          DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
          SOROBAN_ADMIN_ADDRESS: ${{ secrets.SOROBAN_ADMIN_ADDRESS }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: ./scripts/deploy_testnet.sh --dry-run

      - name: Authorization check (deployment mode)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        id: auth-check
        run: |
          ALLOWED_TEAMS="maintainers"
          ACTOR="${{ github.actor }}"
          echo "Deployment requested by: $ACTOR"

          OWNER_TEAM="TevaLabs/maintainers"
          MEMBERSHIP=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/TevaLabs/teams/maintainers/memberships/$ACTOR" \
            --jq '.state' 2>/dev/null || echo "not_found")

          if [ "$MEMBERSHIP" = "active" ]; then
            echo "  ✓ Authorized as $OWNER_TEAM member"
          else
            echo "  ✘ $ACTOR is not an authorized deployer"
            echo "    Only $OWNER_TEAM members can run deployment mode."
            exit 1
          fi

      - name: Run deployment script (deploy)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
          SOROBAN_NETWORK_PASSPHRASE: ${{ secrets.SOROBAN_NETWORK_PASSPHRASE }}
          DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
          SOROBAN_ADMIN_ADDRESS: ${{ secrets.SOROBAN_ADMIN_ADDRESS }}
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
        run: ./scripts/deploy_testnet.sh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployed-wasm
          path: target/wasm32-unknown-unknown/release/xelma_contract.wasm
          retention-days: 7
